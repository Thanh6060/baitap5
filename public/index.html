<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Bài tập 06</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: #f3f4f6;
      margin: 0;
      padding: 40px;
    }

    h1 {
      margin-bottom: 5px;
    }

    .subtitle {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .tech {
      color: #10b981;
      font-size: 13px;
      margin-bottom: 30px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    .card {
      background: white;
      padding: 25px;
      width: 360px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h3 {
      color: #059669;
      font-size: 16px;
      margin-bottom: 20px;
    }

    label {
      font-size: 13px;
      color: #374151;
      display: block;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      margin-bottom: 15px;
      outline: none;
    }

    input:focus {
      border-color: #10b981;
      background: #fff;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #059669;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #047857;
    }

    .result {
      margin-top: 15px;
      padding: 10px;
      background: #f3f4f6;
      border-radius: 6px;
      font-size: 13px;
      color: #6b7280;
    }
  </style>
</head>

<body>




<div class="container">

  <!-- FORM 1 -->
  <div class="card">
    <h3>FORM 1 — KIỂM TRA THÔNG TIN</h3>

    <form id="form1">
      <label>Tên</label>
      <input type="text" id="name1" placeholder="Nhập tên..." />

      <label>Tuổi</label>
      <input type="number" id="age1" placeholder="Nhập tuổi..." />

      <button type="submit">Gửi GET /api/info</button>
    </form>

    <div id="result1" class="result">
      Kết quả sẽ hiện ở đây...
    </div>
  </div>

  <!-- FORM 2 -->
  <div class="card">
    <h3>FORM 2 — ĐĂNG KÝ NGƯỜI DÙNG</h3>

    <form id="form2">
      <label>Tên</label>
      <input type="text" id="name2" placeholder="Nhập tên..." />

      <label>Tuổi</label>
      <input type="number" id="age2" placeholder="Nhập tuổi..." />

      <label>Email</label>
      <input type="email" id="email2" placeholder="Nhập email..." />

      <button type="submit">Gửi POST /api/register</button>
    </form>

    <div id="result2" class="result">
      Kết quả sẽ hiện ở đây...
    </div>
  </div>

</div>

<script>
// FORM 1
document.getElementById("form1").addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name1").value;
  const age = document.getElementById("age1").value;

  const res = await fetch(`/api/info?name=${name}&age=${age}`);
  const data = await res.json();

  document.getElementById("result1").innerText =
    JSON.stringify(data, null, 2);
});

// FORM 2
document.getElementById("form2").addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name2").value;
  const age = document.getElementById("age2").value;
  const email = document.getElementById("email2").value;

  const res = await fetch("/api/register", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({ name, age, email }),
  });

  const data = await res.json();

  document.getElementById("result2").innerText =
    JSON.stringify(data, null, 2);
});
</script>

</body>
</html>
